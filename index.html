let score = 0;
const quiz = document.getElementById("quiz");

questions.forEach((q, i) => {
    const card = document.createElement("div");
    card.className = "card";

    let html = `<h3>Q${i + 1}: ${q.q}</h3><div class='choices'>`;

    q.c.forEach((choice, j) => {
        html += `<div class='choice-container'><input type='radio' name='q${i}' value='${j}'> ${choice}</div>`;
    });

    html += `</div><button onclick="check(${i})">Check</button>`;
    html += `<p id='r${i}'></p>`;

    card.innerHTML = html;
    quiz.appendChild(card);
});

function check(i) {
    const opts = document.getElementsByName('q' + i);
    let sel = -1;
    opts.forEach(o => { if (o.checked) sel = parseInt(o.value) });

    const res = document.getElementById('r' + i);
    if(sel === -1) {
        res.innerHTML = "Please select an answer.";
        return;
    }

    if (sel === questions[i].a) {
        res.innerHTML = "‚úî Correct";
        res.className = "correct";
        score++;
    } else {
        res.innerHTML = "‚úò Wrong. Correct answer was: " + questions[i].c[questions[i].a];
        res.className = "wrong";
    }
}

function showScore() {
    document.getElementById('score').innerText = "Final Score: " + score + " / " + questions.length;
}
